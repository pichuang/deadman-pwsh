#
#	deadman configuration file (PowerShell version)
#	Format: name	address	[options]
#
#	Fully compatible with the original deadman config format
#	Supports Tab or space as delimiters
#

# === Google Public DNS ===
HinetDNS	168.95.1.1
googleDNS	8.8.4.4

# === Other Public DNS ===
cloudflareDNS	1.1.1.1

---

# === TCP ping examples ===
# Uses Test-NetConnection (tnc) on Windows, hping3 on macOS/Linux
web-http	ifconfig.me	via=tcp port=80
web-https	ifconfig.me	via=tcp port=443

# === IPv6 target examples ===
googleDNS-v6	2001:4860:4860::8888
quad9-v6	2620:fe::fe

# === Source interface examples ===
#local-via-eth0	192.168.1.1 source=eth0

