#
#	deadman 設定檔（PowerShell 版本）
#	格式：名稱	位址	[選項]
#
#	與原版 deadman 設定檔格式完全相容
#	支援 Tab 或空格作為分隔符號
#

# === Google 公用 DNS ===
googleDNS	8.8.8.8
googleDNS2	8.8.4.4

# === 其他公用 DNS ===
quad9		9.9.9.9
cloudflare	1.1.1.1

---

# === IPv6 目標範例 ===
#googleDNS-v6	2001:4860:4860::8888
#quad9-v6	2620:fe::fe

# === 指定來源介面範例 ===
#local-via-eth0	192.168.1.1 source=eth0

# === 原版進階選項（本版本解析但不使用）===
#
#	SSH Relay 語法：
#	名稱	位址	relay=SSH主機 os=Linux user=使用者 key=金鑰路徑
#
#	SNMP Ping 語法：
#	名稱	位址	relay=SNMP主機 via=snmp community=社區字串
#
#	Network Namespace 語法（僅 Linux）：
#	名稱	位址	relay=命名空間名稱 via=netns
#
#	VRF 語法（僅 Linux）：
#	名稱	位址	relay=VRF名稱 via=vrf
