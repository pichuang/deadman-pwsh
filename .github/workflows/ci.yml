name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-pwsh:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]

    runs-on: ${{ matrix.os }}
    name: "${{ matrix.os }} / PowerShell 7"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set console to UTF-8
        shell: cmd
        run: chcp 65001

      - name: Install Pester 5
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester
          Write-Host "Pester version: $((Get-Module Pester).Version)"
          Write-Host "PowerShell version: $($PSVersionTable.PSVersion)"

      - name: Install ThreadJob module
        shell: pwsh
        run: |
          if (-not (Get-Module -Name ThreadJob -ListAvailable -ErrorAction SilentlyContinue)) {
            Install-Module -Name ThreadJob -Force -Scope CurrentUser -SkipPublisherCheck
          }

      - name: Run Pester tests
        id: pester
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests/'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.TestResult.OutputPath = './test-results.xml'
          $config.Filter.ExcludeTag = @('Network')

          Invoke-Pester -Configuration $config

      - name: Generate test summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path './test-results.xml') {
            [xml]$xml = Get-Content './test-results.xml'
            $r = $xml.'test-results'
            $total   = [int]$r.total
            $passed  = [int]$r.total - [int]$r.failures - [int]$r.errors - [int]$r.skipped
            $failed  = [int]$r.failures + [int]$r.errors
            $skipped = [int]$r.skipped
            $icon = if ($failed -eq 0) { ':white_check_mark:' } else { ':x:' }
            $summary = "## $icon Test Results - ${{ matrix.os }} / PowerShell 7`n`n"
            $summary += "| Metric | Count |`n|--------|-------|`n"
            $summary += "| **Total** | $total |`n| **Passed** | $passed |`n"
            $summary += "| **Failed** | $failed |`n| **Skipped** | $skipped |`n"
            if ($failed -gt 0) {
              $summary += "`n### Failed Tests`n"
              $cases = $xml.SelectNodes('//test-case[@success="False"]')
              foreach ($tc in $cases) {
                $summary += "`n- **$($tc.name)**`n  > $($tc.failure.message)`n"
              }
            }
            $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
          else {
            "## :warning: No test results found" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-pwsh
          path: ./test-results.xml

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Tests (${{ matrix.os }} / PowerShell 7)"
          path: './test-results.xml'
          reporter: dotnet-nunit
          fail-on-empty: 'false'

  test-powershell:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]

    runs-on: ${{ matrix.os }}
    name: "${{ matrix.os }} / Windows PowerShell 5.1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set console to UTF-8
        shell: cmd
        run: chcp 65001

      - name: Install Pester 5
        shell: powershell
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester
          Write-Host "Pester version: $((Get-Module Pester).Version)"
          Write-Host "PowerShell version: $($PSVersionTable.PSVersion)"

      - name: Run Pester tests
        id: pester
        shell: powershell
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests/'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.TestResult.OutputPath = './test-results.xml'
          $config.Filter.ExcludeTag = @('Network')

          Invoke-Pester -Configuration $config

      - name: Generate test summary
        if: always()
        shell: powershell
        run: |
          if (Test-Path './test-results.xml') {
            [xml]$xml = Get-Content './test-results.xml'
            $r = $xml.'test-results'
            $total   = [int]$r.total
            $passed  = [int]$r.total - [int]$r.failures - [int]$r.errors - [int]$r.skipped
            $failed  = [int]$r.failures + [int]$r.errors
            $skipped = [int]$r.skipped
            if ($failed -eq 0) { $icon = ':white_check_mark:' } else { $icon = ':x:' }
            $summary = "## $icon Test Results - ${{ matrix.os }} / Windows PowerShell 5.1`n`n"
            $summary += "| Metric | Count |`n|--------|-------|`n"
            $summary += "| **Total** | $total |`n| **Passed** | $passed |`n"
            $summary += "| **Failed** | $failed |`n| **Skipped** | $skipped |`n"
            if ($failed -gt 0) {
              $summary += "`n### Failed Tests`n"
              $cases = $xml.SelectNodes('//test-case[@success="False"]')
              foreach ($tc in $cases) {
                $summary += "`n- **$($tc.name)**`n  > $($tc.failure.message)`n"
              }
            }
            $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
          else {
            "## :warning: No test results found" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-powershell
          path: ./test-results.xml

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Tests (${{ matrix.os }} / Windows PowerShell 5.1)"
          path: './test-results.xml'
          reporter: dotnet-nunit
          fail-on-empty: 'false'
