name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test-pwsh:
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]

    runs-on: ${{ matrix.os }}
    name: "${{ matrix.os }} / PowerShell 7"

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set console to UTF-8
        shell: cmd
        run: chcp 65001

      - name: Install Pester 5
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester
          Write-Host "Pester version: $((Get-Module Pester).Version)"
          Write-Host "PowerShell version: $($PSVersionTable.PSVersion)"

      - name: Install ThreadJob module
        shell: pwsh
        run: |
          if (-not (Get-Module -Name ThreadJob -ListAvailable -ErrorAction SilentlyContinue)) {
            Install-Module -Name ThreadJob -Force -Scope CurrentUser -SkipPublisherCheck
          }

      - name: Run Pester tests
        id: pester
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests/'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'JUnitXml'
          $config.TestResult.OutputPath = './test-results.xml'
          $config.Filter.ExcludeTag = @('Network')

          Invoke-Pester -Configuration $config

      - name: Generate test summary
        if: always()
        shell: pwsh
        env:
          MATRIX_OS: ${{ matrix.os }}
        run: |
          if (Test-Path './test-results.xml') {
            [xml]$xml = Get-Content './test-results.xml'
            $ts = $xml.testsuites
            $total   = [int]$ts.tests
            $failed  = [int]$ts.failures + [int]$ts.errors
            $skipped = [int]$ts.disabled
            $passed  = $total - $failed - $skipped
            $icon = if ($failed -eq 0) { ':white_check_mark:' } else { ':x:' }
            $osName = $env:MATRIX_OS

            $summary = "## $icon Test Results - $osName / PowerShell 7`n`n"
            $summary += "| Metric | Count |`n|--------|-------|`n"
            $summary += "| **Total** | $total |`n| **Passed** | $passed |`n"
            $summary += "| **Failed** | $failed |`n| **Skipped** | $skipped |`n"

            if ($failed -gt 0) {
              $summary += "`n### :x: Failed Tests`n"
              $cases = $xml.SelectNodes('//testcase[failure]')
              foreach ($tc in $cases) {
                $summary += "`n- **$($tc.name)**`n  > $($tc.failure.message)`n"
              }
            }

            if ($skipped -gt 0) {
              $summary += "`n<details><summary>:fast_forward: Skipped Tests ($skipped)</summary>`n`n"
              $cases = $xml.SelectNodes('//testcase[skipped]')
              foreach ($tc in $cases) {
                $reason = if ($tc.skipped.message) { $tc.skipped.message } else { 'No reason given' }
                $summary += "- **$($tc.name)** - _${reason}_`n"
              }
              $summary += "`n</details>`n"
            }

            $summary += "`n### :clipboard: All Test Results`n`n"
            $summary += "| Status | Test Suite | Test Name | Duration |`n"
            $summary += "|:------:|-----------|-----------|----------|`n"
            $suites = $xml.SelectNodes('//testsuite[@name]')
            foreach ($suite in $suites) {
              $suiteName = $suite.name
              foreach ($tc in $suite.SelectNodes('testcase')) {
                $tcName = $tc.name
                $tcTime = if ($tc.time) { "$($tc.time)s" } else { '-' }
                if ($tc.SelectSingleNode('failure')) {
                  $summary += "| :x: | ``$suiteName`` | $tcName | $tcTime |`n"
                } elseif ($tc.SelectSingleNode('skipped')) {
                  $summary += "| :fast_forward: | ``$suiteName`` | $tcName | $tcTime |`n"
                } else {
                  $summary += "| :white_check_mark: | ``$suiteName`` | $tcName | $tcTime |`n"
                }
              }
            }

            $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
          else {
            "## :warning: No test results found" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results-${{ matrix.os }}-pwsh
          path: ./test-results.xml

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        with:
          name: "Tests (${{ matrix.os }} / PowerShell 7)"
          path: './test-results.xml'
          reporter: java-junit
          fail-on-empty: 'false'
          fail-on-error: 'false'

  test-powershell:
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]

    runs-on: ${{ matrix.os }}
    name: "${{ matrix.os }} / Windows PowerShell 5.1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set console to UTF-8
        shell: cmd
        run: chcp 65001

      - name: Install Pester 5
        shell: powershell
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester
          Write-Host "Pester version: $((Get-Module Pester).Version)"
          Write-Host "PowerShell version: $($PSVersionTable.PSVersion)"

      - name: Run Pester tests
        id: pester
        shell: powershell
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests/'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'JUnitXml'
          $config.TestResult.OutputPath = './test-results.xml'
          $config.Filter.ExcludeTag = @('Network')

          Invoke-Pester -Configuration $config

      - name: Generate test summary
        if: always()
        shell: powershell
        env:
          MATRIX_OS: ${{ matrix.os }}
        run: |
          if (Test-Path './test-results.xml') {
            [xml]$xml = Get-Content './test-results.xml'
            $ts = $xml.testsuites
            $total   = [int]$ts.tests
            $failed  = [int]$ts.failures + [int]$ts.errors
            $skipped = [int]$ts.disabled
            $passed  = $total - $failed - $skipped
            if ($failed -eq 0) { $icon = ':white_check_mark:' } else { $icon = ':x:' }
            $osName = $env:MATRIX_OS

            $summary = "## $icon Test Results - $osName / Windows PowerShell 5.1`n`n"
            $summary += "| Metric | Count |`n|--------|-------|`n"
            $summary += "| **Total** | $total |`n| **Passed** | $passed |`n"
            $summary += "| **Failed** | $failed |`n| **Skipped** | $skipped |`n"

            if ($failed -gt 0) {
              $summary += "`n### :x: Failed Tests`n"
              $cases = $xml.SelectNodes('//testcase[failure]')
              foreach ($tc in $cases) {
                $summary += "`n- **$($tc.name)**`n  > $($tc.failure.message)`n"
              }
            }

            if ($skipped -gt 0) {
              $summary += "`n<details><summary>:fast_forward: Skipped Tests ($skipped)</summary>`n`n"
              $cases = $xml.SelectNodes('//testcase[skipped]')
              foreach ($tc in $cases) {
                if ($tc.skipped.message) { $reason = $tc.skipped.message } else { $reason = 'No reason given' }
                $summary += "- **$($tc.name)** - _${reason}_`n"
              }
              $summary += "`n</details>`n"
            }

            $summary += "`n### :clipboard: All Test Results`n`n"
            $summary += "| Status | Test Suite | Test Name | Duration |`n"
            $summary += "|:------:|-----------|-----------|----------|`n"
            $suites = $xml.SelectNodes('//testsuite[@name]')
            foreach ($suite in $suites) {
              $suiteName = $suite.name
              foreach ($tc in $suite.SelectNodes('testcase')) {
                $tcName = $tc.name
                if ($tc.time) { $tcTime = "$($tc.time)s" } else { $tcTime = '-' }
                if ($tc.SelectSingleNode('failure')) {
                  $summary += "| :x: | ``$suiteName`` | $tcName | $tcTime |`n"
                } elseif ($tc.SelectSingleNode('skipped')) {
                  $summary += "| :fast_forward: | ``$suiteName`` | $tcName | $tcTime |`n"
                } else {
                  $summary += "| :white_check_mark: | ``$suiteName`` | $tcName | $tcTime |`n"
                }
              }
            }

            $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
          else {
            "## :warning: No test results found" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results-${{ matrix.os }}-powershell
          path: ./test-results.xml

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        with:
          name: "Tests (${{ matrix.os }} / Windows PowerShell 5.1)"
          path: './test-results.xml'
          reporter: java-junit
          fail-on-empty: 'false'
          fail-on-error: 'false'
